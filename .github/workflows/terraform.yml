name: Terraform CI/CD
on:
  pull_request:
    branches: [ main ] # fires when PR is raised targeting main
  push:
    branches: [ main ] # fires when code is merged to main

permissions:
  #id-token: write # Required for OIDC authentication to Azure
  contents: read # Read the repository code — checkout the .tf files
  pull-requests: write # Post terraform plan output as a PR comment

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID  }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET  }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID  }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  terraform:
    name: Terraform Plan / Apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # install correct terraform version
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.11.4

      # create dev.tfvars file to read
      - name: Create tfvars file
        run: |
          mkdir -p environments
          cat > environments/dev.tfvars << EOF
          location            = "westus"
          resource_group_name = "rg-hub-spoke-lab"
          environment_name    = "dev"
          admin_username      = "${{secrets.TF_ADMIN_USERNAME}}"
          spoke_vnet_address  = "10.2.0.0/16"
          spoke_vnet_subnet   = "10.2.1.0/24"
          alert_email         = "${{secrets.TF_ALERT_EMAIL}}"
          EOF

      # connect to remote state
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="key=hub-spoke-dev.tfstate"

      # check terraform format
      - name: Terraform Format Check
        run: terraform fmt -check

      # validate terraform code
      - name: Terraform Validate
        run: terraform validate

      # run terraform plan
      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="environments/dev.tfvars" \
            -no-color 2>&1 | tee plan_output.txt
        continue-on-error: true

      # write plan output to PR
      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan_output.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0,60000) + '\n... truncated'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:  context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`\n${truncated}\n\`\`\``
              })

      # apply only on merge to main
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          terraform apply \
            -var-file="environments/dev.tfvars" \
            -auto-approve
